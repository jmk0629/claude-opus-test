name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate agents and commands
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent frontmatter
        run: |
          fail=0
          shopt -s nullglob
          for f in test/agents/*.md agents/*.md; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::missing YAML frontmatter (first line must be '---')"
              fail=1
              continue
            fi
            for key in name description; do
              if ! awk '/^---$/{c++; next} c==1' "$f" | grep -q "^$key:"; then
                echo "::error file=$f::frontmatter missing required key '$key'"
                fail=1
              fi
            done
          done
          exit $fail

      - name: Check command frontmatter
        run: |
          fail=0
          shopt -s nullglob
          for f in test/commands/*.md commands/*.md; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::missing YAML frontmatter"
              fail=1
              continue
            fi
            if ! awk '/^---$/{c++; next} c==1' "$f" | grep -q "^description:"; then
              echo "::error file=$f::frontmatter missing 'description'"
              fail=1
            fi
          done
          exit $fail

      - name: Summary
        if: always()
        run: |
          echo "## Validated files" >> $GITHUB_STEP_SUMMARY
          echo "### Agents" >> $GITHUB_STEP_SUMMARY
          find test/agents agents -name '*.md' 2>/dev/null | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || true
          echo "### Commands" >> $GITHUB_STEP_SUMMARY
          find test/commands commands -name '*.md' 2>/dev/null | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || true

  lint-harness:
    name: Lint harness (drift / cross-ref / report presence)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/lint-harness.sh
        run: bash scripts/lint-harness.sh
